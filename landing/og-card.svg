<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0f14"/>
      <stop offset="100%" stop-color="#161e29"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1f2a37" stroke-width="1">
    <path d="M0 80 H1200"/><path d="M0 160 H1200"/><path d="M0 240 H1200"/>
    <path d="M0 320 H1200"/><path d="M0 400 H1200"/><path d="M0 480 H1200"/>
    <path d="M0 560 H1200"/>
    <path d="M120 0 V630"/><path d="M240 0 V630"/><path d="M360 0 V630"/>
    <path d="M480 0 V630"/><path d="M600 0 V630"/><path d="M720 0 V630"/>
    <path d="M840 0 V630"/><path d="M960 0 V630"/><path d="M1080 0 V630"/>
  </g>
  <rect x="0" y="280" width="1200" height="80" fill="url(#grid)"/>

  <!-- brand mark -->
  <g transform="translate(72, 90)">
    <rect width="64" height="64" rx="14" fill="#10b981"/>
    <text x="32" y="44" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
      font-size="36" font-weight="800" text-anchor="middle" fill="#0b0f14">OH</text>
    <text x="84" y="44" font-family="ui-sans-serif, -apple-system, Inter, Helvetica, sans-serif"
      font-size="32" font-weight="700" fill="#e6edf3">Open<tspan fill="#10b981">·</tspan>Hand</text>
  </g>

  <!-- headline -->
  <g transform="translate(72, 220)">
    <text font-family="ui-sans-serif, -apple-system, Inter, Helvetica, sans-serif"
      font-size="80" font-weight="800" fill="url(#title)" letter-spacing="-2">
      <tspan x="0" dy="0">The agent runtime that</tspan>
      <tspan x="0" dy="92">doesn't <tspan fill="#10b981">pick a side.</tspan></tspan>
    </text>
  </g>

  <!-- subhead -->
  <g transform="translate(72, 460)">
    <text font-family="ui-sans-serif, -apple-system, Inter, Helvetica, sans-serif"
      font-size="26" font-weight="500" fill="#8b97a7">
      <tspan x="0" dy="0">LLM-agnostic · Plugin-first · Sandboxed by default</tspan>
    </text>
  </g>

  <!-- bottom strip -->
  <g transform="translate(72, 540)">
    <text font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
      font-size="20" font-weight="500" fill="#10b981">
      <tspan x="0" dy="0">$ npx tsx examples/hello-world.ts</tspan>
    </text>
    <text x="1056" y="0" font-family="ui-sans-serif, Inter, sans-serif"
      font-size="20" font-weight="600" fill="#8b97a7" text-anchor="end">MIT · TypeScript</text>
  </g>
</svg>
