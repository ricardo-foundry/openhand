name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: ["20.x"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: TypeScript build (all workspaces)
        run: npm run build --workspaces --if-present

      - name: Tests (all workspaces)
        run: npm test --workspaces --if-present
        env:
          CI: "true"

  lint-docs:
    name: Lint docs & OSS files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check required files exist
        run: |
          for f in README.md LICENSE CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md CHANGELOG.md .editorconfig .env.example; do
            if [ ! -f "$f" ]; then
              echo "::error file=$f::missing required file"; exit 1
            fi
          done
