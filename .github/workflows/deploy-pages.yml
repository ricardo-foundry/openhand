name: Deploy landing + API reference to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "packages/**"
      - "docs/api-README.md"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# GitHub Pages writes need pages: write + id-token: write.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time. Don't cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + deploy landing/ and docs/api
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate TypeDoc API reference
        run: npm run docs:api

      - name: Generate landing/build-meta.json
        # Numbers come from grep / npm audit / git so they're impossible to
        # drift from reality. The script writes landing/build-meta.json which
        # the hero card on the landing page reads at runtime.
        run: node scripts/build-meta.js

      - name: Assemble publish tree
        # The Pages artifact is a single directory. We stage landing/ at the
        # root and drop the generated API reference under /api/.
        run: |
          mkdir -p _site
          cp -R landing/* _site/
          mkdir -p _site/api
          cp -R docs/api/* _site/api/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
