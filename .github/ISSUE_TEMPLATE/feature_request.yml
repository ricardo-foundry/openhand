name: Feature Request
description: Suggest a new feature, tool, or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement. The more context you give, the
        quicker maintainers can evaluate the idea.
  - type: checkboxes
    id: prechecks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and discussions for similar requests.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this feature solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior. API sketches are welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or prior art.
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - core / agent loop
        - tools
        - sandbox / security
        - llm provider
        - cli ux
        - web ui
        - plugin system
        - docs
        - ci / release
    validations:
      required: true
  - type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a PR for this feature.
